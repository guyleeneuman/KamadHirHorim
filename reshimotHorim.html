<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>רשימות קמ"ד- גיא-לי</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
    <img class="navbar" src="assets/elements/logos.png" alt="icon 1">
    <img class="title" src="assets/titles/inviteTitle.png" alt="icon 1">


<div class="searchBox">
  <input id="searchInput" class="searchInput" placeholder="חיפוש לפי שם החיילת">

  <svg id="searchBtn" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960">
    <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56Z"/>
  </svg>

</div>
<div id="ordersContainer"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    get,
    update
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEEpVNL80542ub1E-5GPh6mHp5gqqmIzc",
  authDomain: "kamadhir-d9679.firebaseapp.com",
  databaseURL: "https://kamadhir-d9679-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kamadhir-d9679",
  storageBucket: "kamadhir-d9679.firebasestorage.app",
  messagingSenderId: "27030388884",
  appId: "1:27030388884:web:800ae468940d68f2e4f481"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("ordersContainer");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

let allInvites = [];

async function loadInvites() {

    const snapshot = await get(ref(db, "invites"));

    allInvites = [];

    if (snapshot.exists()) {

        const data = snapshot.val();

        Object.keys(data).forEach(key => {
            allInvites.push({ id: key, ...data[key] });
        });
    }

    render(allInvites);
}

function render(list) {

    container.innerHTML = "";

    list.forEach(invite => {

        const isChecked = invite.checked;

        container.innerHTML += `
          <div class="inviteCard ${isChecked ? "checked" : ""}">

            <div class="actions">
                <button class="checkBtn" onclick="toggleCheck('${invite.id}', ${isChecked})">
                    
                </button>
            </div>

            <div class="topRow">
                שם אורח: ${invite.inviteName || ""} <br>
ת"ז: ${invite.inviteId}

            </div>
           

            <div class="middleRow">
                שם החניכה: ${invite.soldierName} |
              כיתה: ${invite.className || ""} 
              
            </div>
           <div class="bottomRow">
  קרבה: ${invite.relation || ""} |
  הערות: ${invite.notes || "אין"}
 ${invite.weapon === "כן"
    ? ` | <img 
        src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAACXBIWXMAAAsTAAALEwEAmpwYAAACH0lEQVR4nO2XTUtVURSGn5sWOlBrIjTxCoGQSIOMhBxE0G/wK7IgjGriqH6BIBgZKFI00UlBNBJHBU78iOg6cBhRZFpCiihoRCre2PAGh7hX17HOcUv7gQv7nP0u1rsu+2MdCAQCgUAgWaaBvH45oPqweJiOBPn+m9ytkEIBE/oXcgdoeqKIhz0L8Z18KMTI5H7X9GEqxK3zf0U+LC3PyP93hQwB9fhFNTBjvUeim/UHcC1msgzQCbwCvqdwSe5KFhgEdoAt4Dw2SoEXCZvP7affG1TwmFHfLf0ysKBxcwFdv+YekBJZJVwz6t9I3wIMa3y3wNKb11wTKXFSCTeM+hXpTwAXNV4HWlWA44Lez0XeJU6Xkk4Z9evSV+n5fmRtu7Hj4R/PiVMGfFTS68aYd9Kfjby7CswCt4Ajkb1jPUD+mh4l/AAcM8Y8UsxAkflmzX9Ka1k1AD91/F7aQ+sMjcc8QvvSKCIDvFbCxwb96ZhFLAF1KdRBpxJ+ASoN+jvSP8MjyoGvMnbFGPP7JncnnDfckKm3xs2Y0S3uYk7hEbMy1W7Un5H+Mx5RJ1PfgKMxe6sRPOK2TD2NETOqmLitfqI8lym3TyyUAKuKqcEjcjFbh3ORm98r5mSs1qi/J/0TPGNDxiqM+pfSd+AZ7yNtSVadaiFci96mT2D3TX4cz7gMbMbsm3rxlEadXovAdhHzazoYbqb5hRcIBAKBAAnyC9H9WrdnfsWHAAAAAElFTkSuQmCC"
        alt="weapon"
        style="height:16px; vertical-align:middle; filter: brightness(0) saturate(100%);">
      יש נשק`
    : ""}
  ${invite.disabledPass === "כן"
    ? ` | <svg xmlns="http://www.w3.org/2000/svg"
          height="16px"
          viewBox="0 -960 960 960"
          width="16px"
          fill="black"
          style="vertical-align: middle;">
          <path d="M423.5-743.5Q400-767 400-800t23.5-56.5Q447-880 480-880t56.5 23.5Q560-833 560-800t-23.5 56.5Q513-720 480-720t-56.5-23.5ZM680-80v-200H480q-33 0-56.5-23.5T400-360v-240q0-33 23.5-56.5T480-680q24 0 41.5 10.5T559-636q55 66 99.5 90.5T760-520v80q-53 0-107-23t-93-55v138h120q33 0 56.5 23.5T760-300v220h-80Zm-280 0q-83 0-141.5-58.5T200-280q0-72 45.5-127T360-476v82q-35 14-57.5 44.5T280-280q0 50 35 85t85 35q39 0 69.5-22.5T514-240h82q-14 69-69 114.5T400-80Z"/>
        </svg> יש תו נכה`
    : ""}
</div>

          </div>
        `;
    });
}


function doSearch() {

    const value = searchInput.value.toLowerCase();

    const filtered = allInvites.filter(i =>
        (i.soldierName || "").toLowerCase().includes(value)
    );

    render(filtered);
}

searchBtn.addEventListener("click", doSearch);

searchInput.addEventListener("input", doSearch);

loadInvites();


window.toggleCheck = async function(id, current) {

    const newValue = !current;

    await update(ref(db, "invites/" + id), {
        checked: newValue
    });

    loadInvites();
}

</script>

<style>
    body {
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/background/sandBg.png");
    background-size: cover;
    background-position: center;
    background-repeat:repeat-y;
    direction: ltr;
    font-family: "secular";
}
   .title{
    top: 15%;
   }
   .forword {
    cursor: pointer;
    position: absolute;
    top: 85%;
    left: 22%;
    transform: translateX(-50%);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    transition: transform 0.3s ease, filter 0.3s ease;
}

.forword:hover {
    transform: translateX(-50%) scale(1.1);
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
}

.forword:active {
    transform: translateX(-50%) scale(0.95);
}
</style>
</body>
</html>
